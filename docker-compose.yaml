version: "3.9"
services:
  db:
    image: postgres:16
    container_name: project-inventory
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project-inventory
    ports:
      - "5433:5432"
    volumes:
      - banco-data:/var/lib/postgresql/data

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    command: ["postgres", "-c", "max_connections=1000"]
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    container_name: project-inventory-backend
    build:
      context: ./project-inventory-backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    restart: always
    volumes:
      - ./project-inventory-backend:/app
      - /app/node_modules
      - imagesprofile:/app/public/avatars
    env_file:
      - ./project-inventory-backend/.env
    depends_on:
      - db

  frontend:
    container_name: project-inventory-frontend
    build:
      context: ./project-inventory-frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./project-inventory-frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./project-inventory-frontend/.env
    depends_on:
      - backend

  redis:
    image: redis:latest
    container_name: evolution_redis
    restart: always
    command: redis-server --port 6379 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - evolution_redis:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    depends_on:
      - redis
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      SERVER_URL: http://evolution-api:8080

      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY:-429683C4C977415CAAFCCE10F7D57E11}

      DATABASE_ENABLE: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api

      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLE: false

      LOG_LEVEL: DEBUG
      LOG_COLOR: true

      WEBHOOOK_GLOBAL_ENABLED: false

      CONFIG_SESSION_PHONE_CLIENT: Evolution api
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30

      DEL_INSTANCE: false

volumes:
  banco-data:
  postgres_data:
  imagesprofile:
  evolution_instances:
  evolution_redis:
