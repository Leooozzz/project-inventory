name: ci

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build backend frontend db

      - name: Start services
        run: docker compose up -d db backend

      - name: Wait for backend
        run: sleep 15

      - name: Test backend
        run: curl http://localhost:3001 || exit 1

      - name: Stop containers
        run: docker compose down

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: project-inventory-frontend

      - run: npm run build
        working-directory: project-inventory-frontend